name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */3 * * *'  # каждые 3 часа
  workflow_dispatch:         # ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Bump cache-busting version in README
        run: |
          # Генерируем метку времени
          TS=$(date +%s)
          # Меняем параметр v= на текущий timestamp
          sed -i "s/&v=[0-9]*/\&v=$TS/g" README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "chore: update stats cache buster" && git push)